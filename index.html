
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Gopal AI Portfolio</title>

<style>
/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background: linear-gradient(-45deg,#020617,#0f172a,#111827,#1e293b);
  background-size:400% 400%;
  animation: bgMove 10s ease infinite;
  color:white;
  overflow-x:hidden;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:20px 10%;
  background:rgba(0,0,0,0.5);
  position:sticky;
  top:0;
}

/* HERO */
.hero{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:80px 10%;
  flex-wrap:wrap;
}

.hero h2{
  font-size:50px;
  color:#4da3ff;
}

/* BUTTON */
.btn{
  display:inline-block;
  margin-top:20px;
  padding:10px 20px;
  background:#4da3ff;
  color:white;
  text-decoration:none;
  border-radius:8px;
}

/* PROFILE */
.profile{
  width:250px;
  height:250px;
  border-radius:50%;
  overflow:hidden;
}

/* SECTIONS */
section{
  padding:70px 10%;
  opacity:0;
  transform:translateY(40px);
  transition:all 0.8s ease;
}

section.show{
  opacity:1;
  transform:translateY(0);
}

/* SKILLS */
.skills{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:15px;
}

.skill-box{
  background:#111827;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

/* PROJECTS */
.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.project-box{
  background:#111827;
  padding:20px;
  border-radius:12px;
}

/* ANIMATION */
@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}
</style>
</head>

<body>

<header>
  <h1>Gopal</h1>
  <nav>
    <a href="#skills">Skills</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <div>
    <h2><span id="typing"></span></h2>
    <p>AI Developer | Python Programmer | ML Enthusiast</p>
    <a class="btn" href="https://github.com/">GitHub</a>
  </div>

  <div class="profile">
    <img src="Gp.png" style="width:100%;height:100%;object-fit:cover;">
  </div>
</section>

<section id="skills">
  <h2>Skills</h2>
  <div class="skills">
    <div class="skill-box">Python</div>
    <div class="skill-box">C++</div>
    <div class="skill-box">JavaScript</div>
    <div class="skill-box">AI / ML</div>
  </div>
</section>

<section id="projects">
  <h2>Projects</h2>
  <div class="projects">
    <div class="project-box">AI Assistant</div>
    <div class="project-box">Brain Tracker</div>
    <div class="project-box">Portfolio Website</div>
  </div>
</section>

<section id="contact">
  <h2>Contact</h2>
  <p>Email: example@gmail.com</p>
</section>

<footer style="text-align:center;padding:20px;color:#aaa;">
  © 2026 Gopal
</footer>

<script>
/* TYPING */
const text = ["AI Developer","Python Programmer","ML Engineer"];
let i=0,j=0;
const el=document.getElementById("typing");

function type(){
  if(!el) return;

  el.textContent=text[i].slice(0,++j);

  if(j===text[i].length){
    i=(i+1)%text.length;
    j=0;
    setTimeout(type,1000);
  }else{
    setTimeout(type,80);
  }
}
type();

/* SCROLL ANIMATION */
const sections=document.querySelectorAll("section");

const observer=new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
},{threshold:0.15});

sections.forEach(sec=>observer.observe(sec));
</script>

</body>
</html>
